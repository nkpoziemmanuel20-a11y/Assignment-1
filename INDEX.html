<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kpozyke</title>
    <style>
        .containter{
            background-color: bisque;
            height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
        }
     .calBox{
        border: 2px solid #18020271;

        }
        .display{
            height: 150px;
            width: 320px;
            background: #141414;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .inputBox{
           background: #07b3aa;
            width: 90%;
            height: 80%;
            border-radius: 20px;

        }
        .input{
            height: 100%;
            width: 100%;
            background-color: transparent;
            outline: none;
            font-size: 50px;
             border-radius: 20px;
        }
        /* CAL BUTTON COLLECTION*/
        .calBnt{
         display: flex;
         justify-content: center;
         
        }

        .btns{
            width:100%;
            height: 100%;
            display: flex;
            flex-direction: column;
           


        }
        .bnt{
            width:25%;
            height:100px;
            font-size: 30px;
            border: 3px inset #9b1717bb;
            background: #11996cc0;
            
        }

    </style>
   <script src="New work/new.js  ">
    </script>
</head>
<body>
    <div class="containter">
        <div class="calBox"  >
            <div class="display">
<div class="inputBox">
        <input class="input" type="number" name="" id="">
</div>
            </div>
            <div class="calBnt">
               <div class="btns">
                <div class="bntRow">
                    <button class="bnt">-</button><button class="bnt">+</button><button class="bnt">x</button><button class="bnt">=</button>
                </div>
                <div class="bntRow">
              <button class="bnt">0</button><button class="bnt">1</button><button class="bnt">2</button><button class="bnt">3</button>
              <!-- comment -->
                </div>
                <div class="bntRow">
                    <button class="bnt">4</button><button class="bnt">5</button><button class="bnt">6</button><button class="bnt">7</button>
                </div>
                <div class="bntRow">
                    <button class="bnt">8</button><button class="bnt">9</button><button class="bnt">sin</button><button class="bnt">cos</button>
                </div>
            </div>
                
            </div>
        </div>
   
         
</body>
</html>
